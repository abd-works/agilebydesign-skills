# Workspace defaults for the abd-practice-pipeline.
# Per-document overrides live in markdown frontmatter under `abd_pipeline:`.

defaults:
  # Step 4 — write story-graph.json after MD finalize.
  # one of: yes | no | prompt
  md_to_json: prompt

  # Step 5 — render .drawio after JSON change.
  # one of: yes | no | prompt
  json_to_drawio: yes

  # Step 6 — write JSON back after .drawio is edited.
  # one of: yes | no | prompt
  drawio_to_json: prompt

# Path conventions for this engagement. The pipeline derives sibling paths
# from the markdown file using these rules.
paths:
  # markdown lives under story/
  doc_glob: "story/**/*.md"
  # for story/foo.md → story/foo.story-graph.json + story/foo.drawio
  graph_suffix: ".story-graph.json"
  drawio_suffix: ".drawio"

# Default practice skill to use when /abd-run-practice is invoked without one.
# Resolved relative to the agilebydesign-skills repo root.
default_practice_skill: skills/story-driven-delivery/abd-story-mapping
