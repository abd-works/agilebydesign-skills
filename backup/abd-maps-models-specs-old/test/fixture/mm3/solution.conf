{
  "output_dir": "maps-models-specs",
  "chunk_index_path": null,
  "context_path": "context",
  "source_path": "docs",
  "no_tree": false,
  "context_curation": {
    "section_boundaries": {
      "all_caps_standalone": true,
      "section_path_max_depth": 2,
      "section_break_max_chars": 80,
      "section_break_max_words": 8,
      "section_break_caps_ratio": 0.85
    },
    "document_region_keywords": {
      "front_matter": ["---", "title:", "author:"],
      "toc": ["table of contents", "contents"],
      "rules": ["rules", "mechanics", "how it works"],
      "examples": ["examples", "for example", "sample"],
      "glossary": ["glossary", "definitions"],
      "appendix": ["appendix", "appendices"],
      "legal": ["copyright", "license", "terms"]
    },
    "noise_heading_keywords": ["table of contents", "index", "glossary"],
    "out_of_scope_section_keywords": [
      "adventures",
      "sanguine stories",
      "creating a series",
      "gamemastering",
      "tactics",
      "background",
      "character sheet",
      "license",
      "printed in the usa",
      "welcome to mutants",
      "what is a roleplaying game",
      "what is mutants",
      "using this book",
      "the heroes",
      "the gamemaster",
      "supporting characters",
      "animals",
      "emerald city",
      "freedom city",
      "ghost town",
      "time of the apes",
      "archetype",
      "making the most of advantages",
      "adventure summary",
      "creating adventures",
      "next-to-instant heroes",
      "quickstart character",
      "home-front heroes",
      "series frameworks",
      "legacies",
      "answering the call",
      "across the multiverse"
    ],
    "definition_cues": ["refers to", "is a", "means", ":"],
    "example_cues": ["for example", "for instance", "such as", "e.g."],
    "chunking": {
      "definition": {"max_words": 80, "min_words": 10},
      "rule": {"max_words": 200, "min_words": 20},
      "table": {"row_aware": true},
      "example": {"max_words": 150, "min_words": 15, "priority": 0.5},
      "min_chunk": {"min_words": 2, "min_chars": 15},
      "merge_table_like": {"enabled": true, "max_cell_chars": 150, "max_cell_lines": 8, "min_run_length": 2},
      "merge_header_with_next": {"enabled": true, "max_header_chars": 60},
      "merge_definition_runs": {"enabled": true, "max_words_per_block": 80, "max_merged_words": 250, "min_run_length": 2},
      "merge_section_blocks": {
        "enabled": true,
        "max_section_words": 400,
        "overflow_max_words": 500
      }
    },
    "multi_purpose_split": false
  }
}
