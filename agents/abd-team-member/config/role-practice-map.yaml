# Maps team-role (bootstrap) to practice skills under agilebydesign-skills/skills/
# Common skills (every role): story-graph-ops, execute_using_rules, workspace_skill, track_task

team_role:
  product_owner:
    label: "Product Owner"
    practice_skills:
      - abd-story-mapping
    also_cover:
      - "Prioritization (increments / thin slicing — use story graph + delivery guidance until a prioritization skill exists)"

  analyst:
    label: "Analyst"
    practice_skills:
      - abd-acceptance-criteria
      - abd-specify-by-example

  engineer:
    label: "Engineer"
    practice_skills: []
    also_cover:
      - "Acceptance-test-driven development (add under skills/ when packaged)"
      - "Clean code (add under skills/ when packaged)"
    notes: "Until ATDD/clean-code skills exist, follow those practices from AGENT.md and engagement rules; use story-graph-ops / execute_using_rules when artifacts tie to the graph."
